<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In – Docmo</title>
    <link rel="stylesheet" href="styles/main.css">
    <script src="js/db.js"></script>
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: stretch;
            background: var(--bg-primary);
        }

        .auth-left {
            flex: 1;
            background: linear-gradient(135deg, #1a1a3e 0%, #0d1117 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px;
            position: relative;
            overflow: hidden;
        }

        .auth-left::before {
            content: '';
            position: absolute;
            top: -80px;
            left: -80px;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(108, 99, 255, .15), transparent 70%);
            pointer-events: none;
        }

        .auth-right {
            width: 480px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: var(--bg-card);
            border-left: 1px solid var(--border);
        }

        .auth-form {
            width: 100%;
            max-width: 360px;
        }

        .divider-line {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            color: var(--text-muted);
            font-size: 13px;
        }

        .divider-line::before,
        .divider-line::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 11px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            background: var(--bg-secondary);
            transition: var(--transition);
            width: 100%;
        }

        .social-btn:hover {
            border-color: var(--border-light);
            background: var(--bg-hover);
        }

        .err-banner {
            background: rgba(244, 63, 94, .1);
            border: 1px solid rgba(244, 63, 94, .3);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            font-size: 13px;
            color: var(--rose);
            display: none;
            margin-bottom: 14px;
        }

        @media(max-width:768px) {
            .auth-left {
                display: none;
            }

            .auth-right {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <!-- LEFT BRANDING -->
    <div class="auth-left">
        <a href="index.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;margin-bottom:56px">
            <div
                style="width:44px;height:44px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px">
                📋</div>
            <span style="font-size:24px;font-weight:900;color:white">Docmo</span>
        </a>
        <div style="text-align:center;max-width:340px">
            <h1 style="font-size:38px;font-weight:900;line-height:1.15;margin-bottom:16px;color:white">Welcome back 👋
            </h1>
            <p style="font-size:16px;color:rgba(255,255,255,.65);margin-bottom:40px">Sign in to your account and
                continue building smart forms.</p>
        </div>
        <div style="display:flex;gap:24px">
            <div style="text-align:center">
                <div style="font-size:26px;font-weight:900;color:white">50K+</div>
                <div style="font-size:12px;color:rgba(255,255,255,.5);margin-top:3px">Users</div>
            </div>
            <div style="text-align:center">
                <div style="font-size:26px;font-weight:900;color:white">2M+</div>
                <div style="font-size:12px;color:rgba(255,255,255,.5);margin-top:3px">Responses</div>
            </div>
            <div style="text-align:center">
                <div style="font-size:26px;font-weight:900;color:white">99.9%</div>
                <div style="font-size:12px;color:rgba(255,255,255,.5);margin-top:3px">Uptime</div>
            </div>
        </div>
    </div>

    <!-- RIGHT FORM -->
    <div class="auth-right">
        <div class="auth-form">
            <div style="margin-bottom:28px">
                <h2 style="font-size:26px;font-weight:900;margin-bottom:6px">Sign in</h2>
                <p style="font-size:14px;color:var(--text-secondary)">New to Docmo? <a href="register.html"
                        style="color:var(--accent);font-weight:600">Create an account</a></p>
            </div>

            <!-- Social -->
            <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:6px">
                <button class="social-btn" onclick="socialLogin('Google')"><span style="font-size:18px">🌐</span>
                    Continue with Google</button>
                <button class="social-btn" onclick="socialLogin('GitHub')"><span style="font-size:18px">🐙</span>
                    Continue with GitHub</button>
            </div>
            <div class="divider-line">or sign in with email</div>

            <!-- Error banner -->
            <div class="err-banner" id="errBanner"></div>

            <!-- Form -->
            <div class="input-group mb-14">
                <label class="input-label">Email Address</label>
                <input type="email" class="input-field" id="loginEmail" placeholder="you@example.com"
                    onkeydown="if(event.key==='Enter')doLogin()">
            </div>
            <div class="input-group mb-6">
                <label class="input-label">Password</label>
                <div style="position:relative">
                    <input type="password" class="input-field" id="loginPwd" placeholder="Your password"
                        style="padding-right:44px" onkeydown="if(event.key==='Enter')doLogin()">
                    <button
                        style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:16px"
                        onclick="togglePwd('loginPwd')">👁</button>
                </div>
            </div>
            <div
                style="display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;font-size:13px">
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox"
                        id="rememberMe" style="accent-color:var(--accent)"> Remember me</label>
                <a href="#" style="color:var(--accent)" onclick="forgotPassword()">Forgot password?</a>
            </div>

            <button class="btn btn-primary btn-full btn-lg" onclick="doLogin()" id="loginBtn">Sign In →</button>

            <div style="margin-top:20px;font-size:12px;color:var(--text-muted);text-align:center">
                By signing in, you agree to our <a href="#" style="color:var(--accent)">Terms</a> & <a href="#"
                    style="color:var(--accent)">Privacy Policy</a>
            </div>
        </div>
    </div>

    <script>
        DocmoDB.init();
        applyTheme();

        // Auto-redirect if already logged in
        if (localStorage.getItem('docmo_logged_in') === 'true') window.location = 'dashboard.html';

        function applyTheme() {
            const u = DocmoDB.getUser();
            if (u.theme) document.documentElement.setAttribute('data-theme', u.theme);
        }

        function doLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const pwd = document.getElementById('loginPwd').value;
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('errBanner');

            if (!email || !email.includes('@')) { showErr('Please enter a valid email address.'); return; }
            if (!pwd) { showErr('Please enter your password.'); return; }

            btn.textContent = 'Signing in...'; btn.disabled = true;
            err.style.display = 'none';

            // Simulate API call
            setTimeout(() => {
                // For demo: any email/password combo works
                const name = email.split('@')[0];
                const firstName = name.charAt(0).toUpperCase() + name.slice(1);
                DocmoDB.updateUser({ email, name: firstName, firstName, avatar: firstName[0].toUpperCase() });
                localStorage.setItem('docmo_logged_in', 'true');
                window.location = 'dashboard.html';
            }, 900);
        }

        function socialLogin(provider) {
            const btn = document.querySelector(`.social-btn:nth-of-type(${provider === 'Google' ? 1 : 2})`);
            const orig = btn.innerHTML;
            btn.innerHTML = `⏳ Connecting to ${provider}...`;
            setTimeout(() => {
                const name = provider === 'Google' ? 'John Smith' : 'dev_user';
                DocmoDB.updateUser({ name, firstName: name.split(' ')[0], email: name.toLowerCase().replace(' ', '.') + `@${provider.toLowerCase()}.com`, avatar: name[0].toUpperCase(), plan: 'Pro' });
                localStorage.setItem('docmo_logged_in', 'true');
                window.location = 'dashboard.html';
            }, 1200);
        }

        function forgotPassword() {
            const email = document.getElementById('loginEmail').value.trim();
            const msg = email ? `Password reset link sent to ${email}!` : 'Enter your email above, then click forgot password.';
            if (email) { showToast('📧 ' + msg, 'var(--emerald)'); } else { showErr(msg); }
        }

        function togglePwd(id) {
            const inp = document.getElementById(id);
            inp.type = inp.type === 'password' ? 'text' : 'password';
        }

        function showErr(msg) { const e = document.getElementById('errBanner'); e.textContent = '❌ ' + msg; e.style.display = 'block'; document.getElementById('loginBtn').textContent = 'Sign In →'; document.getElementById('loginBtn').disabled = false; }
        function showToast(msg, color = 'var(--accent)') { document.querySelectorAll('.toast').forEach(t => t.remove()); const t = document.createElement('div'); t.style.cssText = `position:fixed;bottom:28px;right:28px;padding:11px 20px;border-radius:12px;font-weight:600;z-index:999;color:white;font-size:13px;background:${color}`; t.textContent = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }
    </script>
</body>

</html>
