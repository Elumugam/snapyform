<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account – SnapyForm</title>
    <link rel="stylesheet" href="/styles/main.css">
    <script src="/js/api.js"></script>
</head>

<body>
    <div class="auth-layout">
        <div class="auth-left">
            <div style="max-width:400px;width:100%">
                <a href="/" class="flex items-center gap-8 mb-24" style="text-decoration:none">
                    <div class="logo-mark">S</div><span class="logo-text" style="font-size:17px">SnapyForm</span>
                </a>
                <div style="font-size:28px;font-weight:800;letter-spacing:-.5px;margin-bottom:12px">Start for free</div>
                <div style="font-size:14px;color:var(--text-3);margin-bottom:36px;line-height:1.6">Join over 50,000
                    teams building better forms and collecting cleaner data.</div>
                <div style="display:flex;flex-direction:column;gap:8px">
                    <div class="flex items-center gap-8" style="font-size:13px;color:var(--text-2)"><span
                            style="color:var(--green);font-weight:700">✓</span> No credit card required</div>
                    <div class="flex items-center gap-8" style="font-size:13px;color:var(--text-2)"><span
                            style="color:var(--green);font-weight:700">✓</span> AI-powered form generation</div>
                    <div class="flex items-center gap-8" style="font-size:13px;color:var(--text-2)"><span
                            style="color:var(--green);font-weight:700">✓</span> Export to Excel, CSV, JSON, PDF, SQL
                    </div>
                    <div class="flex items-center gap-8" style="font-size:13px;color:var(--text-2)"><span
                            style="color:var(--green);font-weight:700">✓</span> Real-time analytics dashboard</div>
                    <div class="flex items-center gap-8" style="font-size:13px;color:var(--text-2)"><span
                            style="color:var(--green);font-weight:700">✓</span> Team collaboration tools</div>
                </div>
            </div>
        </div>
        <div class="auth-right">
            <div class="auth-form">
                <div class="auth-title">Create account</div>
                <div class="auth-sub">Already have one? <a href="/login"
                        style="color:var(--accent);font-weight:500">Sign in</a></div>
                <div id="errBanner"
                    style="display:none;background:var(--red-soft);border:1px solid rgba(239,68,68,.2);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:14px">
                </div>
                <div class="field"><label class="label">Full name</label><input type="text" class="input" id="name"
                        placeholder="John Smith"></div>
                <div class="field"><label class="label">Email address</label><input type="email" class="input"
                        id="email" placeholder="you@company.com"></div>
                <div class="field">
                    <label class="label">Password</label>
                    <input type="password" class="input" id="pwd" placeholder="Min. 6 characters"
                        oninput="checkPwd(this.value)">
                    <div style="margin-top:6px;display:flex;gap:3px" id="pwdBars">
                        <div style="flex:1;height:3px;border-radius:2px;background:var(--surface-3)" id="pb1"></div>
                        <div style="flex:1;height:3px;border-radius:2px;background:var(--surface-3)" id="pb2"></div>
                        <div style="flex:1;height:3px;border-radius:2px;background:var(--surface-3)" id="pb3"></div>
                        <div style="flex:1;height:3px;border-radius:2px;background:var(--surface-3)" id="pb4"></div>
                    </div>
                </div>
                <div class="field"><label class="label">Confirm password</label><input type="password" class="input"
                        id="conf" placeholder="Repeat password" onkeydown="if(event.key==='Enter')doRegister()"></div>
                <label
                    style="display:flex;gap:8px;font-size:12.5px;color:var(--text-3);margin-bottom:16px;cursor:pointer">
                    <input type="checkbox" id="terms" style="accent-color:var(--accent);flex-shrink:0;margin-top:2px"> I
                    agree to the <a href="#" style="color:var(--accent)">Terms of Service</a> and <a href="#"
                        style="color:var(--accent)">Privacy Policy</a>
                </label>
                <button class="btn btn-primary btn-full btn-lg" id="regBtn" onclick="doRegister()">Create
                    Account</button>
            </div>
        </div>
    </div>
    <script>
        if (DocmoAPI.isLoggedIn()) window.location = '/dashboard';
        function checkPwd(v) { const bars = [document.getElementById('pb1'), document.getElementById('pb2'), document.getElementById('pb3'), document.getElementById('pb4')]; let s = 0; if (v.length >= 6) s++; if (/[A-Z]/.test(v)) s++; if (/[0-9]/.test(v)) s++; if (/[^a-zA-Z0-9]/.test(v)) s++; const c = ['var(--red)', 'var(--yellow)', 'var(--yellow)', 'var(--green)']; bars.forEach((b, i) => b.style.background = i < s ? c[s - 1] : 'var(--surface-3)'); }
        async function doRegister() {
            const n = document.getElementById('name').value.trim(), e = document.getElementById('email').value.trim(), p = document.getElementById('pwd').value, c = document.getElementById('conf').value, t = document.getElementById('terms').checked;
            document.getElementById('errBanner').style.display = 'none';
            if (!n) return showErr('Enter your full name.');
            if (!e || !e.includes('@')) return showErr('Enter a valid email.');
            if (p.length < 6) return showErr('Password must be at least 6 characters.');
            if (p !== c) return showErr('Passwords do not match.');
            if (!t) return showErr('Please accept the terms of service.');
            const btn = document.getElementById('regBtn'); btn.textContent = 'Creating account...'; btn.disabled = true;
            try { await DocmoAPI.register(n, e, p); window.location = '/dashboard'; }
            catch (err) { showErr(err.message || 'Registration failed.'); btn.textContent = 'Create Account'; btn.disabled = false; }
        }
        function showErr(m) { const b = document.getElementById('errBanner'); b.textContent = m; b.style.display = 'block'; }
    </script>
</body>

</html>
